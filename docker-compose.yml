version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: petcare
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - petcare-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/petcare
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    volumes:
      - ./prisma:/app/prisma
    networks:
      - petcare-network
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
    name: petcare-postgres-data

networks:
  petcare-network:
    name: petcare-network
